version: 2

models:
  - name: mart_ml_training_dataset
    description: |
      Final ML training dataset with all technical indicators and engineered features.
      Includes train/validation/test splits and target variables for price prediction.
    columns:
      - name: symbol
        description: ASX stock ticker symbol
        tests:
          - not_null
      - name: price_date
        description: Trading date
        tests:
          - not_null
      - name: open_price
        description: Opening price in AUD
      - name: high_price
        description: Highest price during trading day in AUD
      - name: low_price
        description: Lowest price during trading day in AUD
      - name: close_price
        description: Closing price in AUD
        tests:
          - not_null
      - name: volume
        description: Trading volume
      - name: daily_range
        description: High - Low price for the day
      - name: sma_7
        description: 7-day Simple Moving Average
      - name: sma_14
        description: 14-day Simple Moving Average
      - name: sma_30
        description: 30-day Simple Moving Average
      - name: sma_50
        description: 50-day Simple Moving Average
      - name: sma_200
        description: 200-day Simple Moving Average
      - name: rsi_14
        description: 14-day Relative Strength Index (0-100)
      - name: macd_line
        description: MACD Line (12-day EMA - 26-day EMA)
      - name: macd_signal
        description: MACD Signal Line (9-day EMA of MACD)
      - name: macd_histogram
        description: MACD Histogram (MACD Line - Signal Line)
      - name: bb_middle
        description: Bollinger Band Middle (20-day SMA)
      - name: bb_upper
        description: Bollinger Band Upper (SMA + 2×STD)
      - name: bb_lower
        description: Bollinger Band Lower (SMA - 2×STD)
      - name: bb_position
        description: Bollinger Band Position (0-1 scale)
      - name: atr_14
        description: 14-day Average True Range
      - name: volume_sma_20
        description: 20-day Volume Simple Moving Average
      - name: obv
        description: On-Balance Volume (cumulative)
      - name: volume_ratio
        description: Current volume / 20-day volume average
      - name: volatility_20
        description: 20-day rolling standard deviation of daily returns
      - name: lag_1_day_return
        description: 1-day price return percentage (lag feature)
      - name: lag_3_day_return
        description: 3-day price return percentage (lag feature)
      - name: lag_5_day_return
        description: 5-day price return percentage (lag feature)
      - name: lag_7_day_return
        description: 7-day price return percentage (lag feature)
      - name: momentum_7
        description: 7-day momentum (rate of change)
      - name: momentum_14
        description: 14-day momentum
      - name: momentum_30
        description: 30-day momentum
      - name: momentum_1
        description: 1-day momentum
      - name: golden_cross_signal
        description: Binary signal when 50-day SMA crosses above 200-day SMA (1=yes, 0=no)
      - name: death_cross_signal
        description: Binary signal when 50-day SMA crosses below 200-day SMA (1=yes, 0=no)
      - name: ma_crossover_distance
        description: Distance between 50-day and 200-day SMAs
      - name: short_term_trend
        description: Difference between 7-day and 14-day SMAs
      - name: support_20
        description: 20-day rolling low (support level)
      - name: resistance_20
        description: 20-day rolling high (resistance level)
      - name: support_50
        description: 50-day rolling low
      - name: resistance_50
        description: 50-day rolling high
      - name: price_position_20
        description: Current price position within 20-day range (0-1 scale)
      - name: price_position_50
        description: Current price position within 50-day range (0-1 scale)
      - name: sector_code
        description: Numeric sector code (1=gold, 2=oil, 3=silver)
      - name: next_day_return
        description: Target variable - percentage return for next trading day
        tests:
          - not_null
      - name: next_week_return
        description: Target variable - percentage return for next 5 trading days
        tests:
          - not_null
      - name: next_month_return
        description: Target variable - percentage return for next 21 trading days
      - name: split
        description: Train/validation/test split marker
        tests:
          - not_null
          - accepted_values:
              values: ['train', 'validation', 'test']
      - name: fold_number
        description: Cross-validation fold number (1-5) for time-series CV
        tests:
          - not_null
    # Model-level tests removed - dataset is historical, not a live feed